<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Temperatura do Quarto</title>
</head>

<body>

  <h1>Projeto 1 - Temperatura do Quarto</h1>

  <nav>
    <a href="index.html">Home</a> |
    <a href="sensor1.html">1 Sensor</a>
  </nav>

  <h2>Dados de Temperatura</h2>

  <table border="1" id="tabela">
    <tr>
      <th>Data/Hora</th>
      <th>Temperatura (°C)</th>
    </tr>
  </table>

  <script>
    const url = "https://SEU_PROJETO.supabase.co/rest/v1/temperatura_quarto";

    fetch(url, {
      headers: {
        "apikey": "SUA_API_KEY",
        "Authorization": "Bearer SUA_API_KEY"
      }
    })
    .then(res => res.json())
    .then(data => {
      const tabela = document.getElementById("tabela");

      data.forEach(item => {
        const linha = `
          <tr>
            <td>${item.created_at}</td>
            <td>${item.temperatura}</td>
          </tr>
        `;
        tabela.innerHTML += linha;
      });
    });
  </script>

</body>
</html>
