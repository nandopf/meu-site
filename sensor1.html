<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Temperatura do Quarto</title>
  <link rel="stylesheet" href="style.css">
</head>

<script>
const url = "https://ptunjhmkickwuiyxufhv.supabase.co";



fetch(url, {
  headers: {
    "apikey": "sb_secret_NLtudPX9W3Bsu9ju0ycBow_xGDOVrRa", 
    "Authorization": "sb_secret_NLtudPX9W3Bsu9ju0ycBow_xGDOVrRa"
  }
})
.then(res => res.json())
.then(data => {
  const tabela = document.getElementById("tabela");

  // limpar tabela (mantém cabeçalho)
  tabela.innerHTML = `
    <tr>
      <th>Data/Hora</th>
      <th>Temperatura (°C)</th>
    </tr>
  `;

  // ordenar do mais recente
  data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  data.forEach(item => {

    const dataFormatada = new Date(item.created_at).toLocaleString("pt-BR");

    const linha = `
      <tr>
        <td>${dataFormatada}</td>
        <td>${item.temperatura}</td>
      </tr>
    `;

    tabela.innerHTML += linha;
  });
})
.catch(err => {
  console.error("Erro:", err);
});
</script>

<body>

<header>
  <h1>🌡️ Projeto 1 - Temperatura do Quarto</h1>
</header>

<main>

  <div class="card">
    <h2>Dados de Temperatura</h2>

    <table id="tabela">
      <tr>
        <th>Data/Hora</th>
        <th>Temperatura (°C)</th>
      </tr>
    </table>

  </div>

</main>

</body>
</html>
