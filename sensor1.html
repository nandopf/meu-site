<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento Ambiental e Sistema</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<script>
const url = "https://ptunjhmkickwuiyxufhv.supabase.co";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dW5qaG1raWNrd3VpeXh1Zmh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTg1OTUsImV4cCI6MjA5MzE3NDU5NX0.ASh37T-ZHHnFTk_yWLQnWNv91l0AOeUW_1Tj9F-8KD0"; 

const supabaseClient = supabase.createClient(url, key);
let meuGrafico;
let periodoAtual = 'dia';

async function carregarDados(periodo = 'dia') {
  periodoAtual = periodo;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.periodo === periodo);
  });

  let dataInicio = new Date();
  if (periodo === 'dia') dataInicio.setDate(dataInicio.getDate() - 1);
  else if (periodo === 'semana') dataInicio.setDate(dataInicio.getDate() - 7);
  else if (periodo === 'mes') dataInicio.setMonth(dataInicio.getMonth() - 1);
  else dataInicio = new Date(0);

  try {
    let query = supabaseClient
      .from('temperatura_quarto')
      .select('*')
      .order('created_at', { ascending: false });

    if (periodo !== 'total') {
      query = query.gte('created_at', dataInicio.toISOString());
    }

    const { data, error } = await query;
    if (error) throw error;

    const stats = calcularEstatisticas(data);
    atualizarResumo(stats);
    atualizarTabela(data);
    atualizarGrafico(data);
    gerarInsights(stats, periodo);

  } catch (err) {
    console.error("Erro ao carregar dados:", err);
  }
}

function calcularEstatisticas(data) {
  if (data.length === 0) return null;
  const temps = data.map(i => i.temperatura).filter(v => v != null);
  const hums = data.map(i => i.humidade).filter(v => v != null);
  const cpus = data.map(i => i.cpu_temp).filter(v => v != null);

  return {
    temp: {
      avg: temps.reduce((a, b) => a + b, 0) / temps.length,
      max: Math.max(...temps),
      min: Math.min(...temps),
      last: temps[0]
    },
    hum: {
      avg: hums.reduce((a, b) => a + b, 0) / hums.length,
      last: hums[0]
    },
    cpu: {
      last: cpus[0],
      avg: cpus.reduce((a, b) => a + b, 0) / cpus.length
    },
    count: data.length
  };
}

function atualizarResumo(stats) {
  if (!stats) return;
  document.getElementById('temp-avg').innerText = stats.temp.avg.toFixed(1) + '°C';
  document.getElementById('hum-last').innerText = stats.hum.last.toFixed(1) + '%';
  const cpuElem = document.getElementById('cpu-temp');
  cpuElem.innerText = stats.cpu.last.toFixed(1) + '°C';
  cpuElem.style.color = stats.cpu.last > 60 ? '#ef4444' : '#10b981';
}

function gerarInsights(stats, periodo) {
  const container = document.getElementById('insights-text');
  if (!stats) {
    container.innerHTML = "Aguardando dados para análise...";
    return;
  }

  let analise = `Análise do período <strong>${periodo.toUpperCase()}</strong>:<br><br>`;
  
  // Lógica de análise de Temperatura
  if (stats.temp.avg > 26) {
    analise += `⚠️ O ambiente apresenta uma média térmica elevada (${stats.temp.avg.toFixed(1)}°C). `;
  } else if (stats.temp.avg < 20) {
    analise += `❄️ O período foi marcado por temperaturas baixas (${stats.temp.avg.toFixed(1)}°C). `;
  } else {
    analise += `✅ Clima estável: A temperatura média de ${stats.temp.avg.toFixed(1)}°C está dentro da zona de conforto. `;
  }

  // Lógica de Humidade
  if (stats.hum.last > 75) {
    analise += `A humidade atual está alta (${stats.hum.last.toFixed(1)}%), o que pode favorecer a condensação. `;
  } else if (stats.hum.last < 30) {
    analise += `Atenção: Ar seco detectado (${stats.hum.last.toFixed(1)}%). `;
  }

  // Lógica da CPU
  if (stats.cpu.last > 65) {
    analise += `<br><br>🚀 <strong>Alerta de Sistema:</strong> O Raspberry Pi atingiu ${stats.cpu.last.toFixed(1)}°C. Verifique a ventilação do hardware.`;
  } else {
    analise += `<br><br>🖥️ <strong>Saúde do Hardware:</strong> O sistema operou com média de ${stats.cpu.avg.toFixed(1)}°C, indicando boa eficiência térmica.`;
  }

  container.innerHTML = analise;
}

function atualizarTabela(data) {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = `<tr><th>Data/Hora</th><th>Ambiente</th><th>Humidade</th><th>CPU RPi</th></tr>`;
  data.slice(0, 15).forEach(item => {
    const dataFormatada = new Date(item.created_at).toLocaleString("pt-BR");
    tabela.innerHTML += `<tr><td>${dataFormatada}</td><td class="temp-normal">${item.temperatura ?? '--'}°C</td><td class="hum-value">${item.humidade ?? '--'}%</td><td>${item.cpu_temp ?? '--'}°C</td></tr>`;
  });
}

function atualizarGrafico(data) {
  const dadosInvertidos = [...data].slice(0, 40).reverse(); 
  const labels = dadosInvertidos.map(item => new Date(item.created_at).toLocaleTimeString("pt-BR", {hour:'2-digit', minute:'2-digit'}));
  const temps = dadosInvertidos.map(item => item.temperatura);
  const hums = dadosInvertidos.map(item => item.humidade);
  const cpus = dadosInvertidos.map(item => item.cpu_temp);

  const ctx = document.getElementById('graficoTemperatura').getContext('2d');
  if (meuGrafico) meuGrafico.destroy();

  meuGrafico = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Ambiente', data: temps, borderColor: '#2563eb', tension: 0.3, yAxisID: 'y' },
        { label: 'Humidade', data: hums, borderColor: '#0891b2', tension: 0.3, yAxisID: 'y1' },
        { label: 'CPU', data: cpus, borderColor: '#ef4444', borderDash: [5, 5], tension: 0.3, yAxisID: 'y' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { type: 'linear', position: 'left' },
        y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false } }
      }
    }
  });
}

window.onload = () => carregarDados('dia');
setInterval(() => carregarDados(periodoAtual), 60000);
</script>

<body>
<header>
  <h1>🌡️ Monitoramento Completo</h1>
  <p>Ambiente & Saúde do Raspberry Pi</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="sensor1.html">1 Sensor</a>
</nav>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-periodo="dia" onclick="carregarDados('dia')">Diário</button>
    <button class="tab-btn" data-periodo="semana" onclick="carregarDados('semana')">Semanal</button>
    <button class="tab-btn" data-periodo="mes" onclick="carregarDados('mes')">Mensal</button>
    <button class="tab-btn" data-periodo="total" onclick="carregarDados('total')">Total</button>
  </div>

  <div class="summary-grid">
    <div class="summary-item">
      <span class="summary-label">Ambiente Médio</span>
      <span id="temp-avg" class="summary-value">--</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Humidade Atual</span>
      <span id="hum-last" class="summary-value">--</span>
    </div>
    <div class="summary-item" style="border-top: 4px solid #ef4444;">
      <span class="summary-label">CPU Raspberry</span>
      <span id="cpu-temp" class="summary-value">--</span>
    </div>
  </div>

  <!-- SEÇÃO DE INSIGHTS (IA LOCAL) -->
  <div class="card" style="width: 100%; margin-bottom: 2rem; border-left: 5px solid var(--primary); text-align: left;">
    <h2 style="color: var(--primary); font-size: 1.2rem;">💡 Insights Inteligentes</h2>
    <p id="insights-text" style="color: var(--secondary); font-size: 0.95rem; line-height: 1.5;">
      Analisando dados do período...
    </p>
  </div>

  <div class="card" style="width: 100%; margin-bottom: 2rem; height: 400px; box-sizing: border-box;">
    <h2>Gráfico de Monitoramento</h2>
    <div style="height: 300px;">
      <canvas id="graficoTemperatura"></canvas>
    </div>
  </div>

  <div class="card" style="width: 100%; box-sizing: border-box;">
    <h2>Logs do Sistema</h2>
    <table id="tabela"></table>
  </div>
</main>

<footer>
  <p>Desenvolvido por Fernando</p>
</footer>
</body>
</html>
