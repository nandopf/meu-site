<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento Ambiental e Sistema</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<script>
const url = "https://ptunjhmkickwuiyxufhv.supabase.co";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dW5qaG1raWNrd3VpeXh1Zmh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTg1OTUsImV4cCI6MjA5MzE3NDU5NX0.ASh37T-ZHHnFTk_yWLQnWNv91l0AOeUW_1Tj9F-8KD0"; 

const supabaseClient = supabase.createClient(url, key);
let meuGrafico;
let periodoAtual = 'dia';

async function carregarDados(periodo = 'dia') {
  periodoAtual = periodo;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.periodo === periodo);
  });

  let dataInicio = new Date();
  if (periodo === 'dia') dataInicio.setDate(dataInicio.getDate() - 1);
  else if (periodo === 'semana') dataInicio.setDate(dataInicio.getDate() - 7);
  else if (periodo === 'mes') dataInicio.setMonth(dataInicio.getMonth() - 1);
  else dataInicio = new Date(0);

  try {
    let query = supabaseClient
      .from('temperatura_quarto')
      .select('*')
      .order('created_at', { ascending: false });

    if (periodo !== 'total') {
      query = query.gte('created_at', dataInicio.toISOString());
    }

    const { data, error } = await query;
    if (error) throw error;

    atualizarResumo(data);
    atualizarTabela(data);
    atualizarGrafico(data);

  } catch (err) {
    console.error("Erro ao carregar dados:", err);
  }
}

function atualizarResumo(data) {
  if (data.length === 0) return;
  
  const temps = data.map(i => i.temperatura).filter(v => v != null);
  const hums = data.map(i => i.humidade).filter(v => v != null);
  const cpus = data.map(i => i.cpu_temp).filter(v => v != null);

  if (temps.length > 0) {
    document.getElementById('temp-avg').innerText = (temps.reduce((a, b) => a + b, 0) / temps.length).toFixed(1) + '°C';
  }

  if (hums.length > 0) {
    document.getElementById('hum-last').innerText = hums[0].toFixed(1) + '%';
  }

  if (cpus.length > 0) {
    const cpuTemp = cpus[0];
    const cpuElem = document.getElementById('cpu-temp');
    cpuElem.innerText = cpuTemp.toFixed(1) + '°C';
    // Alerta visual se o Raspberry estiver muito quente
    cpuElem.style.color = cpuTemp > 60 ? '#ef4444' : '#10b981';
  }
}

function atualizarTabela(data) {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = `<tr><th>Data/Hora</th><th>Ambiente</th><th>Humidade</th><th>CPU RPi</th></tr>`;
  
  data.slice(0, 15).forEach(item => {
    const dataFormatada = new Date(item.created_at).toLocaleString("pt-BR");
    tabela.innerHTML += `
      <tr>
        <td>${dataFormatada}</td>
        <td class="temp-normal">${item.temperatura ?? '--'}°C</td>
        <td class="hum-value">${item.humidade ?? '--'}%</td>
        <td style="font-weight:bold">${item.cpu_temp ?? '--'}°C</td>
      </tr>`;
  });
}

function atualizarGrafico(data) {
  const dadosInvertidos = [...data].slice(0, 40).reverse(); 
  const labels = dadosInvertidos.map(item => {
    const d = new Date(item.created_at);
    return d.toLocaleTimeString("pt-BR", {hour:'2-digit', minute:'2-digit'});
  });
  
  const temps = dadosInvertidos.map(item => item.temperatura);
  const hums = dadosInvertidos.map(item => item.humidade);
  const cpus = dadosInvertidos.map(item => item.cpu_temp);

  const ctx = document.getElementById('graficoTemperatura').getContext('2d');
  if (meuGrafico) meuGrafico.destroy();

  meuGrafico = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Ambiente (°C)',
          data: temps,
          borderColor: '#2563eb',
          yAxisID: 'y',
          tension: 0.3
        },
        {
          label: 'Humidade (%)',
          data: hums,
          borderColor: '#0891b2',
          yAxisID: 'y1',
          tension: 0.3
        },
        {
          label: 'CPU RPi (°C)',
          data: cpus,
          borderColor: '#ef4444',
          borderDash: [5, 5], // Linha pontilhada para o sistema
          yAxisID: 'y',
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { type: 'linear', position: 'left', title: { display: true, text: 'Temp (°C)' } },
        y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Hum (%)' } }
      }
    }
  });
}

window.onload = () => carregarDados('dia');
setInterval(() => carregarDados(periodoAtual), 60000);
</script>

<body>

<header>
  <h1>🌡️ Monitoramento Completo</h1>
  <p>Ambiente & Saúde do Raspberry Pi</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="sensor1.html">1 Sensor</a>
</nav>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-periodo="dia" onclick="carregarDados('dia')">Diário</button>
    <button class="tab-btn" data-periodo="semana" onclick="carregarDados('semana')">Semanal</button>
    <button class="tab-btn" data-periodo="mes" onclick="carregarDados('mes')">Mensal</button>
    <button class="tab-btn" data-periodo="total" onclick="carregarDados('total')">Total</button>
  </div>

  <div class="summary-grid">
    <div class="summary-item">
      <span class="summary-label">Ambiente Médio</span>
      <span id="temp-avg" class="summary-value">--</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Humidade Atual</span>
      <span id="hum-last" class="summary-value">--</span>
    </div>
    <div class="summary-item" style="border-top: 4px solid #ef4444;">
      <span class="summary-label">CPU Raspberry</span>
      <span id="cpu-temp" class="summary-value">--</span>
    </div>
  </div>

  <div class="card" style="width: 100%; margin-bottom: 2rem; height: 400px; box-sizing: border-box;">
    <h2>Gráfico de Monitoramento</h2>
    <div style="height: 300px;">
      <canvas id="graficoTemperatura"></canvas>
    </div>
  </div>

  <div class="card" style="width: 100%; box-sizing: border-box;">
    <h2>Logs do Sistema</h2>
    <table id="tabela"></table>
  </div>
</main>

<footer>
  <p>Desenvolvido por Fernando</p>
</footer>

</body>
</html>
