<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Temperatura do Quarto</title>
  <link rel="stylesheet" href="style.css">
  <!-- Carregando a biblioteca do Supabase via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<script>
const url = "https://ptunjhmkickwuiyxufhv.supabase.co";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dW5qaG1raWNrd3VpeXh1Zmh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTg1OTUsImV4cCI6MjA5MzE3NDU5NX0.ASh37T-ZHHnFTk_yWLQnWNv91l0AOeUW_1Tj9F-8KD0"; // <-- COLE A CHAVE QUE VOCÊ COPIOU DO SUPABASE AQUI DENTRO DAS ASPAS

const supabaseClient = supabase.createClient(url, key);

async function carregarDados() {
  const tabela = document.getElementById("tabela");
  
  try {
    // Busca os dados da tabela correta
    const { data, error } = await supabaseClient
      .from('temperatura_quarto')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error("Erro ao buscar dados:", error.message);
      return;
    }

    // limpar tabela (mantém cabeçalho)
    tabela.innerHTML = `
      <tr>
        <th>Data/Hora</th>
        <th>Temperatura (°C)</th>
      </tr>
    `;

    data.forEach(item => {
      const dataFormatada = new Date(item.created_at).toLocaleString("pt-BR");
      const linha = `
        <tr>
          <td>${dataFormatada}</td>
          <td>${item.temperatura || 'N/A'}</td>
        </tr>
      `;
      tabela.innerHTML += linha;
    });

  } catch (err) {
    console.error("Erro inesperado:", err);
  }
}

// Carrega os dados quando a página abrir
window.onload = carregarDados;
</script>

<body>

<header>
  <h1>🌡️ Projeto 1 - Temperatura do Quarto</h1>
</header>

<nav>

    <table id="tabela">
      <tr>
        <th>Data/Hora</th>
        <th>Temperatura (°C)</th>
      </tr>
    </table>

  </div>

</main>

</body>
</html>
